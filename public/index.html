<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f">
    <title>Qianai</title>
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/pages.css">
    <style>
        .page-chat {
            display        : flex;
            flex-direction : column;
            height         : 100dvh;
            overflow       : hidden;
        }

        .chat-header {
            display         : flex;
            align-items     : center;
            gap             : 12px;
            padding         : 14px 18px;
            background      : var(--bg-1);
            border-bottom   : 1px solid var(--border-1);
            flex-shrink     : 0;
            z-index         : var(--z-above);
        }

        .chat-header-info { flex: 1; min-width: 0; }

        .partner-name {
            font-weight  : 600;
            font-size    : 0.9375rem;
            white-space  : nowrap;
            overflow     : hidden;
            text-overflow: ellipsis;
        }

        .partner-status {
            font-size : 0.75rem;
            color     : var(--text-muted);
        }

        .partner-status.online { color: var(--success); }

        .chat-header-actions {
            display    : flex;
            align-items: center;
            gap        : 4px;
        }

        .msg-list {
            flex        : 1;
            overflow-y  : auto;
            padding     : 16px;
            display     : flex;
            flex-direction: column;
            gap         : 6px;
        }

        .bubble-wrap {
            display         : flex;
            flex-direction  : column;
            max-width       : 72%;
        }

        .bubble-wrap.mine   { align-self: flex-end; align-items: flex-end; }
        .bubble-wrap.theirs { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding       : 10px 14px;
            border-radius : var(--radius-lg);
            font-size     : 0.9375rem;
            line-height   : 1.5;
            word-break    : break-word;
            position      : relative;
        }

        .bubble-mine {
            background    : var(--accent);
            color         : var(--text-inverse);
            border-bottom-right-radius: 4px;
        }

        .bubble-theirs {
            background    : var(--bg-3);
            border        : 1px solid var(--border-1);
            color         : var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .bubble-deleted {
            background : var(--bg-3);
            color      : var(--text-muted);
            font-size  : 0.875rem;
            font-style : italic;
            border     : 1px solid var(--border-1);
        }

        .bubble-meta {
            display     : flex;
            align-items : center;
            gap         : 4px;
            margin-top  : 4px;
            justify-content: flex-end;
        }

        .bubble-mine .bubble-meta   { opacity: 0.7; }
        .bubble-theirs .bubble-meta { justify-content: flex-start; }

        .bubble-time {
            font-size : 0.6875rem;
        }

        .bubble-media {
            max-width     : 240px;
            max-height    : 300px;
            border-radius : var(--radius-md);
            object-fit    : cover;
        }

        .bubble-file {
            display     : flex;
            align-items : center;
            gap         : 8px;
            color       : inherit;
            font-weight : 500;
            font-size   : 0.875rem;
        }

        .typing-wrap {
            padding    : 0 16px 8px;
            flex-shrink: 0;
        }

        .typing-indicator {
            display      : flex;
            align-items  : center;
            gap          : 4px;
            font-size    : 0.8125rem;
            color        : var(--text-muted);
        }

        .typing-dots {
            display : flex;
            gap     : 3px;
        }

        .typing-dots span {
            width         : 5px;
            height        : 5px;
            border-radius : 50%;
            background    : var(--text-muted);
            animation     : pulse 1.2s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        .chat-input-area {
            padding       : 12px 16px;
            background    : var(--bg-1);
            border-top    : 1px solid var(--border-1);
            display       : flex;
            align-items   : flex-end;
            gap           : 10px;
            flex-shrink   : 0;
        }

        .input-row {
            flex          : 1;
            display       : flex;
            align-items   : flex-end;
            gap           : 8px;
            background    : var(--bg-3);
            border        : 1px solid var(--border-1);
            border-radius : var(--radius-xl);
            padding       : 8px 12px;
            transition    : border-color var(--transition);
        }

        .input-row:focus-within { border-color: var(--accent); }

        #msg-input {
            flex        : 1;
            background  : none;
            border      : none;
            outline     : none;
            color       : var(--text-primary);
            font-size   : 0.9375rem;
            resize      : none;
            max-height  : 120px;
            line-height : 1.5;
        }

        #msg-input::placeholder { color: var(--text-muted); }

        #btn-send {
            width         : 36px;
            height        : 36px;
            border-radius : 50%;
            background    : var(--accent);
            color         : var(--text-inverse);
            display       : flex;
            align-items   : center;
            justify-content: center;
            flex-shrink   : 0;
            transition    : all var(--transition);
        }

        #btn-send:disabled {
            background : var(--bg-4);
            color      : var(--text-muted);
        }

        #btn-send:not(:disabled):hover {
            background : #a855f7;
            transform  : scale(1.05);
        }

        .msg-menu {
            box-shadow: var(--shadow-lg);
        }
    </style>
</head>
<body>

<div class="page-chat">

    <header class="chat-header">
        <div class="avatar avatar-md" id="partner-avatar"></div>
        <div class="chat-header-info">
            <div class="partner-name" id="partner-name">Memuat...</div>
            <div class="partner-status" id="partner-status">Offline</div>
        </div>
        <div class="chat-header-actions">
            <a href="/settings.html" class="btn btn-icon btn-ghost">
                <i class="fa-solid fa-gear"></i>
            </a>
        </div>
    </header>

    <div class="msg-list" id="msg-list"></div>

    <div class="typing-wrap">
        <div class="typing-indicator hidden" id="typing-indicator">
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
            <span>mengetik...</span>
        </div>
    </div>

    <div class="chat-input-area">
        <button class="btn btn-icon btn-ghost" id="btn-file" title="Kirim file">
            <i class="fa-solid fa-paperclip"></i>
        </button>
        <div class="input-row">
            <textarea id="msg-input" placeholder="Tulis pesan..." rows="1"></textarea>
        </div>
        <button id="btn-send" disabled>
            <i class="fa-solid fa-paper-plane"></i>
        </button>
        <input type="file" id="file-input" accept="image/*,video/*,*/*" class="hidden">
    </div>

</div>

<div class="toast-container" id="toast-container"></div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script type="module">
    import { Store }   from '/assets/js/store.js'
    import { ChatUI }  from '/assets/js/chat.js'

    if (!Store.isLoggedIn()) {
        window.location.href = '/auth.html'
    } else if (!Store.getPair()) {
        window.location.href = '/pair.html'
    }

    const token  = Store.getToken()
    const socket = io({ auth: { token }, transports: ['websocket'] })

    socket.on('connect',       () => console.log('[socket] connected'))
    socket.on('connect_error', () => console.warn('[socket] connection failed, offline mode'))

    ChatUI.init(socket)

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/assets/js/sw.js').catch(() => {})

        navigator.serviceWorker.addEventListener('message', (e) => {
            if (e.data?.type === 'sync-messages') ChatUI.syncPending()
        })
    }

    const input = document.getElementById('msg-input')
    if (input) {
        input.addEventListener('input', function () {
            this.style.height = 'auto'
            this.style.height = Math.min(this.scrollHeight, 120) + 'px'
        })
    }
</script>
<script src="/socket.io/socket.io.js"></script>

</body>
</html>
